<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modina Auto Parts Ltd. - Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* মদিনা অটো পার্টস লিমিটেডের অফিসিয়াল ব্র্যান্ড কালার কোড */
        :root {
            --modina-orange: #d3411a;    /* লোগোর গাঢ় কমলা-লাল শেড */
            --modina-dark: #1e1e1e;      /* প্রিমিয়াম ব্ল্যাক/ডার্ক গ্রে শেড */
            --modina-light-bg: #fff5f2;  /* সফট ব্র্যান্ড অ্যাকসেন্ট ব্যাকগ্রাউন্ড */
        }
        .bg-modina { background-color: var(--modina-orange) !important; }
        .text-modina { color: var(--modina-orange) !important; }
        .border-modina { border-color: var(--modina-orange) !important; }
        .bg-modina-dark { background-color: var(--modina-dark) !important; }
        .header-login-container { display: flex !important; align-items: center !important; gap: 12px; }
        
       /* লোগো ইমেজটিকে চারপাশ থেকে একদম নিখুঁতভাবে মিডল পয়েন্টে নিয়ে আসার ফিক্স */
        .modina-logo-img {
            height: 100%;
            width: 100%;
            object-fit: contain;
            object-position: center;
            transform: scale(1.15); /* ফ্রেমের ভেতরের কালো বর্ডার দূর করে লোগো বড় করার জন্য */
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800" onload="loadAllData()">

    <!-- Top Navbar (Official Modina Theme Color) -->
    <nav class="bg-modina text-white p-4 shadow-md flex justify-between items-center fixed top-0 left-0 right-0 z-50 h-16">
        <div class="flex items-center space-x-3">
            
            <!-- গিটহাব রিপোজিটরি থেকে সরাসরি অরিজিনাল ইমেজ ফাইল রেন্ডার -->
            <div class="flex items-center justify-center h-12 w-12 bg-neutral-900 rounded-lg border border-white/20 overflow-hidden shadow-inner">
                <img src="Logo_Modina.jpeg" alt="Modina Logo" class="modina-logo-img">
            </div>

            <div>
                <h1 class="text-sm font-black md:text-base tracking-wide text-white uppercase leading-none mb-0.5">Modina Auto Parts Ltd.</h1>
                <p class="text-[11px] text-orange-100 font-medium leading-none">HR & Admin Service Portal</p>
            </div>
        </div>
        
        <div class="header-login-container">
            <div id="roleBadge" class="bg-black/30 px-2.5 py-1.5 rounded text-xs font-bold text-white border border-white/20 whitespace-nowrap">
                👤 মোড: সাধারণ কর্মী (Read-Only)
            </div>
            <!-- ম্যানেজার পিন বক্স -->
            <div id="loginSection" class="flex items-center bg-white/10 p-1 rounded border border-white/20">
                <input type="password" id="pinInput" placeholder="ম্যানেজার পিন" class="bg-transparent text-white text-xs px-3 py-1.5 placeholder-orange-200 focus:outline-none w-32 text-left font-bold">
                <button type="button" onclick="verifyPin()" class="bg-black text-white text-xs font-bold px-4 py-1.5 rounded cursor-pointer hover:bg-neutral-900 transition-all whitespace-nowrap">লগইন</button>
            </div>
            <button id="logoutBtn" type="button" onclick="logout()" class="hidden bg-black text-white text-xs font-bold px-4 py-1.5 rounded cursor-pointer hover:bg-neutral-900 transition-all">লগআউট</button>
        </div>
    </nav>

    <div class="flex pt-16 min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-modina-dark text-slate-300 fixed bottom-0 top-16 left-0 hidden md:block border-r border-neutral-800">
            <div class="p-4 text-xs font-bold text-neutral-500 uppercase tracking-wider">মেইন মেনু</div>
            <nav class="mt-2 px-2">
                <a href="#" class="flex items-center px-3 py-3 rounded-lg text-sm bg-modina text-white font-bold shadow-sm">
                    <i class="fa-solid fa-cart-plus mr-3"></i><span>ماলামাল রিকুইজিশন</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 md:ml-64 p-4 md:p-6 bg-slate-50">
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                
                <div class="space-y-6">
                    <!-- Requisition Form -->
                    <div id="formContainer" class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <h3 class="text-sm font-black mb-4 border-b pb-2 text-neutral-800 uppercase flex items-center gap-1.5">
                            <i class="fa-solid fa-pen-to-square text-modina"></i> নতুন আবেদন ফর্ম
                        </h3>
                        <form id="reqForm" onsubmit="submitRequisition(event)" class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-bold text-slate-600">ID *</label>
                                    <input type="text" id="empId" required class="mt-1 w-full p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-600">নাম *</label>
                                    <input type="text" id="requester" required class="mt-1 w-full p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600">ডিপার্টমেন্ট *</label>
                                <select id="department" required class="mt-1 w-full p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                                    <option value="">সিলেক্ট করুন</option>
                                    <option value="HR & Admin">HR & Admin</option>
                                    <option value="Accounts">Accounts</option>
                                    <option value="Information Technology (IT)">Information Technology (IT)</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="Administration">Administration</option>
                                    <option value="Sales(TVS)">Sales(TVS)</option>
                                    <option value="Warehouse (Unit-1)">Warehouse (Unit-1)</option>
                                    <option value="Warehouse (Unit-2)">Warehouse (Unit-2)</option>
                                    <option value="Retails Sales (Tazim Enterprise)">Retails Sales (Tazim Enterprise)</option>
                                    <option value="Retails Sales (Hossain International)">Retails Sales (Hossain International)</option>
                                    <option value="Retails Sales (TVS Shopee)">Retails Sales (TVS Shopee)</option>
                                    <option value="Retails Sales (Modina Autos)">Retails Sales (Modina Autos)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600">মালামালের নাম *</label>
                                <input type="text" id="itemName" required class="mt-1 w-full p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-bold text-slate-600">পরিমাণ *</label>
                                    <input type="number" id="itemQty" required min="1" class="mt-1 w-full p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-600">খরচ *</label>
                                    <input type="number" id="estCost" required min="1" class="mt-1 w-full p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-modina hover:bg-orange-800 text-white font-bold py-2.5 rounded-lg text-sm cursor-pointer transition-all shadow-sm">সাবমিট করুন</button>
                        </form>
                    </div>

                    <!-- User Creation Panel -->
                    <div id="superAdminPanel" class="hidden bg-white p-5 rounded-xl border border-orange-200 shadow-sm" style="background-color: var(--modina-light-bg);">
                        <h3 class="text-sm font-black mb-4 border-b pb-2 text-modina uppercase flex items-center gap-1.5">
                            <i class="fa-solid fa-user-plus"></i> নতুন ইউজার তৈরি (Full Admin Access)
                        </h3>
                        <form id="userForm" onsubmit="createNewUser(event)" class="space-y-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-600">পিন কোড সেট করুন *</label>
                                <input type="number" id="newUserPin" required class="mt-1 w-full p-2 bg-white border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600">রোল/পদবি *</label>
                                <select id="newUserRole" class="mt-1 w-full p-2 bg-white border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                                    <option value="Super_Admin">Super_Admin</option>
                                    <option value="HR & Admin">HR & Admin</option>
                                    <option value="Dept_Head">Dept_Head</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600">ডিপার্টমেন্ট অ্যাসাইন করুন *</label>
                                <select id="newUserDept" class="mt-1 w-full p-2 bg-white border border-slate-300 rounded-lg text-sm focus:border-modina focus:outline-none">
                                    <option value="All">All (সব দেখতে পারবে)</option>
                                    <option value="HR & Admin">HR & Admin</option>
                                    <option value="Accounts">Accounts</option>
                                    <option value="Information Technology (IT)">Information Technology (IT)</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="Administration">Administration</option>
                                    <option value="Sales(TVS)">Sales(TVS)</option>
                                    <option value="Warehouse (Unit-1)">Warehouse (Unit-1)</option>
                                    <option value="Warehouse (Unit-2)">Warehouse (Unit-2)</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full bg-neutral-900 hover:bg-black text-white font-bold py-2 rounded-lg text-xs cursor-pointer transition-all">ইউজার যোগ করুন</button>
                        </form>
                    </div>
                </div>

                <!-- Right Table -->
                <div id="tableContainer" class="bg-white p-5 rounded-xl shadow-sm xl:col-span-2 border border-slate-200">
                    <h3 class="text-sm font-black mb-4 border-b pb-2 text-neutral-800 uppercase flex items-center gap-1.5">
                        <i class="fa-solid fa-list text-modina"></i> রিকুইজিশন ট্র্যাকিং হিস্ট্রি
                    </h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-100 border-b border-slate-200 text-neutral-800 font-bold text-xs">
                                    <th class="p-3 w-16">ID</th>
                                    <th class="p-3">বিবরণ ও কর্মকর্তা</th>
                                    <th class="p-3 text-center">Dept Head</th>
                                    <th class="p-3 text-center">HR & Admin</th>
                                    <th class="p-3 text-center">অ্যাকশন</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-100 text-slate-600 text-xs">
                                <tr><td colspan="5" class="p-8 text-center text-slate-400">ডাটা লোড হচ্ছে...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const MASTER_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgmM_PeNdtHWNyHeDL5eT6CWvB8uwUzCjaG1duJXxvAvULAqy9V4MhNkxam_2cPrUg/exec"; 

        let globalData = { Requisition: [], Users: [] };
        let currentRole = "Employee";
        let currentDept = "All";

        function isSuperPower() {
            return currentRole === "Super_Admin" || currentRole === "HR & Admin";
        }

        async function loadAllData() {
            try {
                const res = await fetch(MASTER_SCRIPT_URL);
                globalData = await res.json();
                renderTable(globalData.Requisition); 
            } catch (error) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-500">লিংক বা শিট চেক করুন।</td></tr>`;
            }
        }

        function verifyPin() {
            const pin = document.getElementById('pinInput').value.trim();
            const usersList = globalData.Users || [];
            const user = usersList.find(u => u.Pin.toString().trim() === pin);

            if (user) {
                currentRole = user.Role.toString().trim();
                currentDept = user.Department.toString().trim(); 
                
                if(isSuperPower()) {
                    document.getElementById('roleBadge').innerText = `⚡ মোড: এডমিন প্যানেল (${currentRole})`;
                    document.getElementById('superAdminPanel').classList.remove('hidden');
                } else {
                    document.getElementById('roleBadge').innerText = `👔 মোড: হেড অফ ${currentDept}`;
                    document.getElementById('superAdminPanel').classList.add('hidden');
                }

                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('logoutBtn').classList.remove('hidden');
                
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('pinInput').value = "";
                renderTable(globalData.Requisition);
            } else {
                alert("ভুল পিন! এটি গুগল শিটের 'Users' ট্যাবে নেই।");
            }
        }

        async function createNewUser(e) {
            e.preventDefault();
            const payload = {
                action: "insertRow",
                targetSheet: "Users",
                data: {
                    "Pin": document.getElementById('newUserPin').value,
                    "Role": document.getElementById('newUserRole').value,
                    "Department": document.getElementById('newUserDept').value
                }
            };
            try {
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                alert("নতুন ইউজার সেভ হয়েছে!");
                document.getElementById('userForm').reset();
                loadAllData();
            } catch(err) { alert("ব্যর্থ হয়েছে!"); }
        }

        async function submitRequisition(e) {
            e.preventDefault();
            const randId = "REQ-" + Math.floor(100 + Math.random() * 900);
            const today = new Date().toLocaleDateString('bn-BD');

            const payload = {
                action: "insertRow",
                targetSheet: "Requisition",
                data: {
                    "ID": randId, 
                    "তারিখ": today,
                    "কর্মকর্তা ID": document.getElementById('empId').value,
                    "আবেদনকারী": document.getElementById('requester').value,
                    "ডিপার্টমেন্ট": document.getElementById('department').value,
                    "মালামালের নাম": document.getElementById('itemName').value,
                    "পরিমাণ": document.getElementById('itemQty').value,
                    "আনুমানিক খরচ": document.getElementById('estCost').value,
                    "Dept Head Status": "Pending", 
                    "Final Status": "Pending",
                    "প্রকৃত খরচ (Actual)": "", 
                    "ডেলিভারি তারিখ": ""
                }
            };

            try {
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                document.getElementById('reqForm').reset();
                loadAllData();
            } catch(err) {}
        }

        async function updateStatus(rowIndex, columnName, newValue) {
            const payload = { action: "updateCell", targetSheet: "Requisition", rowIndex, columnName, newValue };
            try { await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) }); loadAllData(); } catch(e){}
        }

        async function submitPurchase(rowIndex) {
            const cost = document.getElementById(`act-${rowIndex}`).value; if(!cost) return;
            const today = new Date().toLocaleDateString('bn-BD');
            
            try { 
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "updateCell", targetSheet: "Requisition", rowIndex, columnName: "প্রকৃত খরচ (Actual)", newValue: cost }) });
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "updateCell", targetSheet: "Requisition", rowIndex, columnName: "ডেলিভারি তারিখ", newValue: today }) });
                loadAllData();
            } catch(e){}
        }

        function logout() {
            currentRole = "Employee"; currentDept = "All";
            document.getElementById('roleBadge').innerText = "👤 মোড: সাধারণ কর্মী (Read-Only)";
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('superAdminPanel').classList.add('hidden');
            document.getElementById('formContainer').style.display = 'block';
            renderTable(globalData.Requisition);
        }

        function renderTable(requisitions) {
            const tbody = document.getElementById('tableBody'); tbody.innerHTML = "";
            if(!requisitions || requisitions.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-400">কোনো রেকর্ড নেই।</td></tr>`; return;
            }

            const filteredList = requisitions.filter(item => {
                if (currentRole === "Employee" || isSuperPower()) return true;

                const itemDept = (item["ডিপার্টমেন্ট"] || "").toString().trim().toLowerCase();
                const loggedInDept = currentDept.trim().toLowerCase();

                if (itemDept === loggedInDept || itemDept.includes(loggedInDept) || loggedInDept.includes(itemDept)) {
                    return true;
                }
                if (loggedInDept.includes("account") && (itemDept.includes("account") || itemDept.includes("একাউন্ট"))) {
                    return true;
                }
                return false;
            });

            if(filteredList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-400 font-bold py-6 bg-orange-50 text-orange-800 border border-orange-200 rounded-lg">আপনার ডিপার্টমেন্টের কোনো পেন্ডিং বা রিকুইজিশন রেকর্ড নেই।</td></tr>`; return;
            }

            [...filteredList].reverse().forEach(item => {
                const itemDept = (item["ডিপার্টমেন্ট"] || "").toString().trim().toLowerCase();
                const loggedInDept = currentDept.trim().toLowerCase();
                const isMyDept = (itemDept === loggedInDept || itemDept.includes(loggedInDept) || loggedInDept.includes(itemDept) || (loggedInDept.includes("account") && itemDept.includes("account")));

                // 1. Dept Head Status
                let deptAction = item["Dept Head Status"] || "Pending";
                if (deptAction === "Pending") {
                    if (isSuperPower() || (isMyDept && currentRole === "Dept_Head")) {
                        deptAction = `<div class="flex justify-center gap-1">
                                        <button onclick="updateStatus(${item.rowIndex}, 'Dept Head Status', 'Approved')" class="bg-emerald-600 text-white text-[10px] px-2 py-1 rounded font-bold cursor-pointer hover:bg-emerald-700">Approve</button>
                                        <button onclick="updateStatus(${item.rowIndex}, 'Dept Head Status', 'Rejected')" class="bg-red-600 text-white text-[10px] px-2 py-1 rounded font-bold cursor-pointer hover:bg-red-700">Reject</button>
                                      </div>`;
                    }
                }

                // 2. HR & Admin Status
                let finalAction = item["Final Status"] || "Pending";
                if (finalAction === "Pending") {
                    if (isSuperPower()) { 
                        finalAction = `<div class="flex justify-center gap-1">
                                        <button onclick="updateStatus(${item.rowIndex}, 'Final Status', 'Approved')" class="bg-emerald-600 text-white text-[10px] px-2 py-1 rounded font-bold cursor-pointer hover:bg-emerald-700">Approve</button>
                                        <button onclick="updateStatus(${item.rowIndex}, 'Final Status', 'Rejected')" class="bg-red-600 text-white text-[10px] px-2 py-1 rounded font-bold cursor-pointer hover:bg-red-700">Reject</button>
                                       </div>`;
                    }
                }

                // 3. Action Column Brand Styling
                let actionCol = "—";
                
                if (item["Dept Head Status"] === "Rejected" || item["Final Status"] === "Rejected") {
                    actionCol = `<span class="text-red-500 font-bold">Rejected</span>`;
                } else if (item["প্রকৃত খরচ (Actual)"]) {
                    actionCol = `<span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold text-[10px] uppercase shadow-sm border border-emerald-200">Successful</span>`;
                } else if (item["Final Status"] === "Approved") {
                    if (isSuperPower()) { 
                        actionCol = `<div class="flex items-center justify-center"><input type="number" id="act-${item.rowIndex}" placeholder="খরচ" class="border text-center w-14 p-0.5 text-xs rounded-l focus:outline-none focus:border-modina"><button onclick="submitPurchase(${item.rowIndex})" class="bg-modina text-white text-[10px] px-2 py-1 rounded-r cursor-pointer hover:bg-orange-800 font-bold">ডান</button></div>`;
                    } else {
                        actionCol = `<span class="bg-orange-100 text-orange-800 px-2 py-1 rounded font-bold text-[10px] uppercase shadow-sm border border-orange-200">Under Processing</span>`;
                    }
                } else if (item["Dept Head Status"] === "Approved") {
                    actionCol = `<span class="text-slate-400 font-medium italic">Under Processing</span>`;
                }

                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50/50">
                        <td class="p-3 text-left font-black text-modina">${item["ID"]}</td>
                        <td class="p-3 text-left">
                            <span class="text-xs font-bold text-neutral-800">${item["মালামালের নাম"]}</span> 
                            <span class="bg-neutral-100 text-neutral-800 px-1.5 py-0.5 rounded font-mono text-[10px] font-bold">Qty: ${item["পরিমাণ"]}</span>
