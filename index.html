<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Requisition Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col antialiased">

    <!-- Web App Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-indigo-600 rounded-xl text-white shadow-md shadow-indigo-100">
                    <i class="fa-solid fa-boxes-stacked text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 tracking-tight">Store Portal</h1>
                    <p class="text-[11px] text-slate-500 font-medium">Material Requisition & Tracking</p>
                </div>
            </div>
            
            <div id="userInfo" class="hidden flex items-center gap-4">
                <div class="text-right">
                    <p id="userDisplayName" class="text-sm font-semibold text-slate-800"></p>
                    <p id="userDisplayRole" class="text-[11px] font-bold px-2 py-0.5 rounded-full inline-block mt-0.5"></p>
                </div>
                <button onclick="logout()" class="p-2.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all duration-200 cursor-pointer" title="Sign Out">
                    <i class="fa-solid fa-right-from-bracket text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex items-center justify-center">
        
        <!-- Auth Card -->
        <div id="authCard" class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow-xl p-8 transition-all duration-300 transform">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-slate-900">Welcome Back</h2>
                <p class="text-sm text-slate-500 mt-1">Sign in with your User ID to access the portal</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">User ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center left-0 pl-3.5 text-slate-400">
                            <i class="fa-solid fa-user-shield"></i>
                        </span>
                        <input type="text" id="userIdInput" placeholder="Enter your official ID" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-indigo-500 focus:bg-white transition-all duration-200">
                    </div>
                </div>
                <button onclick="login()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold rounded-xl text-sm transition-all duration-150 shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 cursor-pointer">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>
        </div>

        <!-- Dashboard Section (Hidden by default) -->
        <div id="dashboard" class="hidden w-full space-y-6 animate-fade-in">
            
            <!-- Employee Action: New Requisition Form -->
            <div id="requisitionFormCard" class="hidden bg-white border border-slate-200 rounded-2xl shadow-sm p-6">
                <div class="flex items-center gap-2.5 mb-5 pb-3 border-b border-slate-100">
                    <i class="fa-solid fa-square-plus text-indigo-500 text-lg"></i>
                    <h2 class="text-base font-bold text-slate-800">Create New Requisition</h2>
                </div>
                <!-- কলাম গ্রিড ৪ করা হয়েছে ডিপার্টমেন্ট যুক্ত করার জন্য -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Department</label>
                        <select id="matDept" class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
                            <option value="">Select Department</option>
                            <option value="VAT">VAT</option>
                            <option value="Accounts">Accounts</option>
                            <option value="HR">HR & Admin</option>
                            <option value="Store">Store</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Material Name</label>
                        <input type="text" id="matName" placeholder="e.g., Safety Gloves" class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Quantity & Unit</label>
                        <input type="text" id="matQty" placeholder="e.g., 10 Pcs" class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Estimated Cost (BDT)</label>
                        <div class="flex gap-3">
                            <input type="number" id="matBudget" placeholder="0.00" class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
                            <button onclick="submitRequisition()" class="px-5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition-all whitespace-nowrap shadow-sm shadow-indigo-100 cursor-pointer">
                                Submit
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Data Table Container -->
            <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex flex-col">
                <div class="px-6 py-4 border-b border-slate-200 bg-slate-50/50 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <h3 class="text-sm font-bold text-slate-800 tracking-tight">All Requisitions Logs</h3>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="loadAllData()" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-slate-100 rounded-lg transition-all cursor-pointer" title="Refresh Data">
                            <i class="fa-solid fa-arrow-rotate-right text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Table Elements -->
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 bg-slate-50">
                                <th class="px-6 py-3.5 text-xs font-bold text-slate-500 uppercase tracking-wider">Date & Info</th>
                                <th class="px-6 py-3.5 text-xs font-bold text-slate-500 uppercase tracking-wider">Material Details</th>
                                <th class="px-6 py-3.5 text-xs font-bold text-slate-500 uppercase tracking-wider">Estimated Cost</th>
                                <th class="px-6 py-3.5 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Dept Head Status</th>
                                <th class="px-6 py-3.5 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Store Status</th>
                                <th class="px-6 py-3.5 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Final Status</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100 text-sm font-medium text-slate-700">
                            <!-- Rows generated by Javascript -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Skeleton/Loader Screen -->
                <div id="tableLoader" class="hidden py-12 flex flex-col items-center justify-center gap-3 text-slate-400 bg-white">
                    <i class="fa-solid fa-circle-notch text-3xl text-indigo-600 animate-spin"></i>
                    <p class="text-xs font-semibold text-slate-500">Syncing live database updates...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Global App Configuration & Scripts -->
    <script>
        const MASTER_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLMUqqa6YDEEM4BgU9Rc1y7rqiEwWX9loxGRrZdl081N74_EsPuHjTFH46gJCNPquc/exec";

        let currentSession = null;
        let cachedDatabase = [];

        async function login() {
            const inputId = document.getElementById("userIdInput").value.trim();
            if (!inputId) return alert("Please type a valid User ID.");

            toggleLoader(true);
            try {
                const res = await fetch(`${MASTER_SCRIPT_URL}?action=getUsers`);
                const users = await res.json();
                const matchedUser = users.find(u => String(u.ID).trim() === inputId);

                if (!matchedUser) {
                    alert("Unauthorized User ID!");
                    toggleLoader(false);
                    return;
                }

                currentSession = matchedUser;
                setupDashboardLayout();
                await loadAllData();
            } catch (e) {
                alert("Cloud Connection Failed.");
                toggleLoader(false);
            }
        }

        function setupDashboardLayout() {
            document.getElementById("authCard").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
            
            const userInfo = document.getElementById("userInfo");
            userInfo.classList.remove("hidden");
            document.getElementById("userDisplayName").innerText = currentSession.Name;
            
            const roleEl = document.getElementById("userDisplayRole");
            roleEl.innerText = currentSession.Role;
            
            if (currentSession.Role === "Employee") {
                roleEl.className = "text-[11px] font-bold px-2 py-0.5 rounded-full inline-block mt-0.5 bg-blue-50 text-blue-700 border border-blue-100";
                document.getElementById("requisitionFormCard").classList.remove("hidden");
                
                // যদি ইউজারের নিজস্ব ডিপার্টমেন্ট আগে থেকেই ফিক্সড থাকে, তবে ড্রপডাউন অটো-সিলেক্ট হবে
                if(currentSession.Department) {
                    document.getElementById("matDept").value = currentSession.Department;
                }
            } else if (currentSession.Role === "Dept Head") {
                roleEl.className = "text-[11px] font-bold px-2 py-0.5 rounded-full inline-block mt-0.5 bg-amber-50 text-amber-700 border border-amber-100";
            } else if (currentSession.Role === "Store Keeper") {
                roleEl.className = "text-[11px] font-bold px-2 py-0.5 rounded-full inline-block mt-0.5 bg-purple-50 text-purple-700 border border-purple-100";
            }
        }

        async function loadAllData() {
            toggleLoader(true);
            try {
                const res = await fetch(`${MASTER_SCRIPT_URL}?action=getRequisitions`);
                cachedDatabase = await res.json();
                renderTable();
            } catch(e) {
                alert("Data loading failed.");
            } finally {
                toggleLoader(false);
            }
        }

        function renderTable() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            
            let dataset = [];
            if (currentSession.Role === "Employee") {
                dataset = cachedDatabase.filter(item => String(item["Employee ID"]).trim() === String(currentSession.ID).trim());
            } else if (currentSession.Role === "Dept Head") {
                dataset = cachedDatabase.filter(item => String(item["Department"]).trim() === String(currentSession.Department).trim());
            } else {
                dataset = cachedDatabase;
            }

            if(dataset.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-slate-400 text-xs">No active transactions found matching your profile.</td></tr>`;
                return;
            }

            dataset.reverse().forEach(item => {
                const dateObj = new Date(item["Timestamp"]);
                const formattedDate = isNaN(dateObj) ? "N/A" : dateObj.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
                
                const matName = item["Material Name"] || "N/A";
                const matQty = item["Quantity & Unit"] || "N/A";
                const matBudget = item["Est. Cost"] || "0";

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50/70 transition-all">
                        <td class="px-6 py-4">
                            <p class="text-xs text-slate-400 font-medium">${formattedDate}</p>
                            <p class="text-sm font-semibold text-slate-800 mt-0.5">${item["Employee Name"] || 'Unknown'}</p>
                            <p class="text-[11px] text-slate-500 font-medium">ID: ${item["Employee ID"] || 'N/A'} • ${item["Department"] || 'N/A'}</p>
                            
                            ${currentSession.Role === 'Employee' && item["Dept Head Status"] === 'Pending' ? `
                                <div class="mt-1.5 flex gap-2">
                                    <button onclick="editRequisition(${item.rowIndex}, '${matName.replace(/'/g, "\\'")}', '${matQty.replace(/'/g, "\\'")}', ${matBudget})" class="text-blue-600 hover:text-blue-800 font-bold text-[10px] cursor-pointer flex items-center gap-0.5">
                                        <i class="fa-solid fa-pen"></i> Edit
                                    </button>
                                    <span class="text-slate-300">|</span>
                                    <button onclick="deleteRequisition(${item.rowIndex})" class="text-red-600 hover:text-red-800 font-bold text-[10px] cursor-pointer flex items-center gap-0.5">
                                        <i class="fa-solid fa-trash"></i> Delete
                                    </button>
                                </div>
                            ` : ''}
                        </td>
                        <td class="px-6 py-4">
                            <p class="font-semibold text-slate-800">${matName}</p>
                            <p class="text-xs text-indigo-600 font-bold mt-0.5 bg-indigo-50/60 px-2 py-0.5 rounded-md inline-block">Qty: ${matQty}</p>
                        </td>
                        <td class="px-6 py-4 font-bold text-slate-800">৳ ${Number(matBudget).toLocaleString('en-BD')}</td>
                        <td class="px-6 py-4 text-center">${renderStatusBadge(item["Dept Head Status"], 'Dept Head', item.rowIndex)}</td>
                        <td class="px-6 py-4 text-center">${renderStatusBadge(item["Store Status"], 'Store Keeper', item.rowIndex)}</td>
                        <td class="px-6 py-4 text-center">${renderFinalBadge(item["Final Status"])}</td>
                    </tr>
                `;
            });
        }

        function renderStatusBadge(status, targetRole, rowIndex) {
            status = status || "Pending";
            if (status === "Pending") {
                if (currentSession.Role === targetRole) {
                    return `
                        <div class="flex items-center justify-center gap-1.5">
                            <button onclick="updateStatus(${rowIndex}, '${targetRole}', 'Approved')" class="px-2 py-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-[10px] rounded shadow-sm transition cursor-pointer">Approve</button>
                            <button onclick="updateStatus(${rowIndex}, '${targetRole}', 'Rejected')" class="px-2 py-1 bg-rose-600 hover:bg-rose-700 text-white font-bold text-[10px] rounded shadow-sm transition cursor-pointer">Reject</button>
                        </div>
                    `;
                }
                return `<span class="px-2.5 py-1 bg-amber-50 text-amber-700 border border-amber-100 rounded-full text-[11px] font-bold inline-flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>Pending</span>`;
            }
            if (status === "Approved") return `<span class="px-2.5 py-1 bg-emerald-50 text-emerald-700 border border-emerald-100 rounded-full text-[11px] font-bold inline-flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>Approved</span>`;
            return `<span class="px-2.5 py-1 bg-rose-50 text-rose-700 border border-rose-100 rounded-full text-[11px] font-bold inline-flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>Rejected</span>`;
        }

        function renderFinalBadge(status) {
            status = status || "Pending";
            if (status === "Approved") return `<span class="px-3 py-1 bg-emerald-600 text-white rounded-full text-[10px] font-black uppercase tracking-wider shadow-sm">Success</span>`;
            if (status === "Rejected") return `<span class="px-3 py-1 bg-rose-600 text-white rounded-full text-[10px] font-black uppercase tracking-wider shadow-sm">Declined</span>`;
            if (status === "Cancelled") return `<span class="px-3 py-1 bg-slate-500 text-white rounded-full text-[10px] font-black uppercase tracking-wider shadow-sm">Cancelled</span>`;
            return `<span class="px-3 py-1 bg-slate-100 text-slate-600 border border-slate-200 rounded-full text-[10px] font-bold uppercase tracking-wider">Processing</span>`;
        }

        async function submitRequisition() {
            const dept = document.getElementById("matDept").value;
            const name = document.getElementById("matName").value.trim();
            const qty = document.getElementById("matQty").value.trim();
            const budget = document.getElementById("matBudget").value.trim();

            if (!dept || !name || !qty || !budget) return alert("Fill up all requisition data fields including Department.");

            toggleLoader(true);
            const payload = {
                action: "addRequisition",
                timestamp: new Date().toISOString(),
                empId: currentSession.ID,
                empName: currentSession.Name,
                dept: dept, // ড্রপডাউন থেকে সিলেক্ট করা ডিপার্টমেন্ট (VAT ইত্যাদি) যাবে
                matName: name,
                qty: qty,
                budget: budget
            };

            try {
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                document.getElementById("matName").value = "";
                document.getElementById("matQty").value = "";
                document.getElementById("matBudget").value = "";
                await loadAllData();
            } catch (e) {
                alert("Failed to submit request.");
                toggleLoader(false);
            }
        }

        async function updateStatus(rowIndex, role, newValue) {
            toggleLoader(true);
            const columnName = (role === "Dept Head") ? "Dept Head Status" : "Store Status";
            const payload = { action: "updateCell", targetSheet: "Requisition", rowIndex, columnName, newValue };

            try {
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                await loadAllData();
            } catch (e) {
                alert("Status sync failed.");
                toggleLoader(false);
            }
        }

        async function editRequisition(rowIndex, currentName, currentQty, currentBudget) {
            const newName = prompt("Enter new Material Name:", currentName);
            if (newName === null) return;
            
            const newQty = prompt("Enter new Quantity & Unit (e.g., 5 Pcs):", currentQty);
            if (newQty === null) return;
            
            const newBudget = prompt("Enter new Estimated Cost:", currentBudget);
            if (newBudget === null) return;

            if(!newName || !newQty || !newBudget) {
                alert("All fields are required!");
                return;
            }

            toggleLoader(true);
            try {
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "updateCell", targetSheet: "Requisition", rowIndex, columnName: "Material Name", newValue: newName }) });
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "updateCell", targetSheet: "Requisition", rowIndex, columnName: "Quantity & Unit", newValue: newQty }) });
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "updateCell", targetSheet: "Requisition", rowIndex, columnName: "Est. Cost", newValue: newBudget }) });
                
                alert("Requisition updated successfully!");
                await loadAllData(); 
            } catch (e) {
                alert("Failed to update.");
                toggleLoader(false);
            }
        }

        async function deleteRequisition(rowIndex) {
            if (!confirm("Are you sure you want to delete this requisition?")) return;
            
            toggleLoader(true);
            try {
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "updateCell", targetSheet: "Requisition", rowIndex, columnName: "Dept Head Status", newValue: "Cancelled" }) });
                await fetch(MASTER_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "updateCell", targetSheet: "Requisition", rowIndex, columnName: "Final Status", newValue: "Cancelled" }) });
                
                alert("Requisition cancelled successfully!");
                await loadAllData();
            } catch (e) {
                alert("Failed to delete.");
                toggleLoader(false);
            }
        }

        function toggleLoader(show) {
            const loader = document.getElementById("tableLoader");
            if (show) loader.classList.remove("hidden");
            else loader.classList.add("hidden");
        }

        function logout() {
            currentSession = null;
            cachedDatabase = [];
            document.getElementById("userIdInput").value = "";
            document.getElementById("userInfo").classList.add("hidden");
            document.getElementById("dashboard").classList.add("hidden");
            document.getElementById("requisitionFormCard").classList.add("hidden");
            document.getElementById("authCard").classList.remove("hidden");
        }
    </script>
</body>
</html>
